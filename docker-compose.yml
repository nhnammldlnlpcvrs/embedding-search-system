# ---------------------------------------------------------------------------
# Qdrant Vector Database — local development instance
# ---------------------------------------------------------------------------
# REST API  : http://localhost:6333
# gRPC       : localhost:6334
# Web UI     : http://localhost:6333/dashboard
# ---------------------------------------------------------------------------

version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: minivdb-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

volumes:
  qdrant_data:
